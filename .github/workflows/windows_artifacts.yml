name: Windows Artifacts Build

on: [push]

env:
  BUILD_TYPE: RelWithDebInfo
  REPO_DIR : ${{github.workspace}}
  BUILD_DIR: ${{github.workspace}}/bin/RelWithDebInfo
  BOOST_TOOLSET: "msvc14.2"
  BOOST_VERSION: "1.72.0"
  BOOST_INSTALL_DIR: "${{github.workspace}}/bin"

jobs:
  build:
    runs-on: windows-2019
    strategy:
      matrix:
       include:
          - OPTIONAL_DEFINES: ""
            TYPE: "default"
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        path: ${{env.REPO_DIR}}
        
    #- uses: FranzDiebold/github-env-vars-action@v2
    #- name: Create Build Environment
    #  run: |
    #    echo "BOOST_ROOT=${{env.BOOST_INSTALL_DIR}}/boost/boost-${{env.BOOST_VERSION}}-win32-${{env.BOOST_TOOLSET}}-x86_64" >> $env:GITHUB_ENV
    #    echo "ARCHIVE_FILENAME=$env:CI_REPOSITORY_NAME-${{matrix.TYPE}}-$env:CI_SHA_SHORT.zip" >> $env:GITHUB_ENV
    #    cmake -E make_directory ${{ env.BUILD_DIR }}

    # install dependencies
    #- name: Cache Windows Boost
    #  uses: actions/cache@v2
    #  id: cache-boost
    #  with:
    #    path: "${{env.BOOST_INSTALL_DIR}}/boost"
    #    key: ${{ runner.os }}-${{ hashFiles('.github/workflows/windows.yml') }}

    - name: Cache vcpkg installed
      uses: actions/cache@v1.0.3
      with:
        path: $VCPKG_ROOT/installed
        key: ${{ runner.os }}-vcpkg-cache-${{ matrix.db-backend }}
      env:
        VCPKG_ROOT: 'C:\vcpkg'

    - name: Cache vcpkg downloads
      uses: actions/cache@v1.0.3
      with:
        path: $VCPKG_ROOT/downloads
        key: ${{ runner.os }}-vcpkg-cache-${{ matrix.db-backend }}
      env:
        VCPKG_ROOT: 'C:\vcpkg'

    - name: Install dependencies
      run: vcpkg integrate install; vcpkg install openssl:x64-windows boost:x64-windows
      env:
        VCPKG_ROOT: 'C:\vcpkg'

    #- if: steps.cache-boost.outputs.cache-hit != 'true'
    #  name: Install Boost
     # uses: MarkusJx/install-boost@v1.0.1
      #id: install-boost
      #with:
        # REQUIRED: Specify the required boost version
        # A list of supported versions can be found here: 
        # https://github.com/actions/boost-versions/blob/main/versions-manifest.json
      #  boost_version: ${{env.BOOST_VERSION}}
       # toolset: ${{env.BOOST_TOOLSET}}
      #  boost_install_dir: ${{env.BOOST_INSTALL_DIR}}
        # NOTE: If a boost version matching all requirements cannot be found,
        # this build step will fail

    - name: Configure
      run: cmake ${{matrix.OPTIONAL_DEFINES}} -B ${{env.BUILD_DIR}} -S ${{env.REPO_DIR}}

    - name: Build
      env:
        MAKEFLAGS: "-j8"
      run: cmake --build ${{env.BUILD_DIR}} --config ${{env.BUILD_TYPE}}

    - name: Archive files
      run: |
        cd bin
        7z a -tzip ${{env.ARCHIVE_FILENAME}} x64_Release
    - name: Archive this artefact
      uses: actions/upload-artifact@v2
      with:
        name: snapshot-${{matrix.TYPE}}
        path: "bin/${{env.ARCHIVE_FILENAME}}"

  upload:
    runs-on: windows-2019
    needs: build
    steps:
      - name: Download artifact snapshot-default
        uses: actions/download-artifact@v1
        with:
          name: snapshot-default
          path: all_snapshots
